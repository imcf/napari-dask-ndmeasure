name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # napari's vispy canvas needs a real (software) GL context, not just a
      # Qt platform plugin — QT_QPA_PLATFORM=offscreen alone isn't enough and
      # fails with "'NoneType' object has no attribute 'decode'" deep in
      # vispy's glGetString. This sets up Xvfb + Mesa properly.
      - uses: pyvista/setup-headless-display-action@v3

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest -v
